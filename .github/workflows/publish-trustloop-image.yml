name: Publish Trustloop Image

on:
  push:
    branches:
      - main
    tags:
      - trustloop/v*
  workflow_dispatch:
    inputs:
      version:
        description: Optional Trustloop image version tag (example: 0.1.1)
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/soluversefr/bifrost

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          VERSION_INPUT="${{ inputs.version }}"
          VERSION_TAG=""

          if [ -n "$VERSION_INPUT" ]; then
            VERSION_TAG="$VERSION_INPUT"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION_TAG="${GITHUB_REF_NAME#trustloop/v}"
          fi

          printf 'tags<<EOF\n' >> "$GITHUB_OUTPUT"
          printf '%s:latest\n' "$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          printf '%s:%s\n' "$IMAGE_NAME" "$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          if [ -n "$VERSION_TAG" ]; then
            printf '%s:%s\n' "$IMAGE_NAME" "$VERSION_TAG" >> "$GITHUB_OUTPUT"
          fi
          printf 'EOF\n' >> "$GITHUB_OUTPUT"

      - name: Build and push Trustloop image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./docker/trustloop/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
